    <div id="progress-bar"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // Scroll Progress Bar
        const progressBar = document.getElementById("progress-bar");
        window.addEventListener("scroll", () => {
          const winScroll =
            document.body.scrollTop || document.documentElement.scrollTop;
          const height =
            document.documentElement.scrollHeight -
            document.documentElement.clientHeight;
          const scrolled = (winScroll / height) * 100;
          progressBar.style.width = scrolled + "%";
        });

        // Intersection Observer for Scroll Animations
        const prefersReducedMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)",
        ).matches;

        if (!prefersReducedMotion) {
          const observerOptions = {
            root: null,
            rootMargin: "0px",
            threshold: 0.1,
          };

          const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("is-visible");
                observer.unobserve(entry.target);
              }
            });
          }, observerOptions);

          document.querySelectorAll(".fade-in-up").forEach((el) => {
            observer.observe(el);
          });
        } else {
          document
            .querySelectorAll(".fade-in-up")
            .forEach((el) => el.classList.add("is-visible"));
        }

        // CTA Particle Effect
        const ctaButtons = document.querySelectorAll(".cta-button");

        ctaButtons.forEach((btn) => {
          btn.addEventListener("mouseenter", createParticles);
          btn.addEventListener("click", createParticles);
        });

        function createParticles(e) {
          if (window.matchMedia("(prefers-reduced-motion: reduce)").matches)
            return;

          const btn = e.currentTarget;
          const rect = btn.getBoundingClientRect();

          // Determine origin based on mouse event or center for keyboard
          let x = e.clientX ? e.clientX - rect.left : rect.width / 2;
          let y = e.clientY ? e.clientY - rect.top : rect.height / 2;

          for (let i = 0; i < 8; i++) {
            createParticle(x, y, btn);
          }
        }

        function createParticle(x, y, parent) {
          const particle = document.createElement("div");
          particle.classList.add("spark");

          // Randomize trajectory
          const angle = Math.random() * Math.PI * 2;
          const velocity = 20 + Math.random() * 30;
          const tx = Math.cos(angle) * velocity;
          const ty = Math.sin(angle) * velocity;

          particle.style.left = `${x}px`;
          particle.style.top = `${y}px`;

          parent.appendChild(particle);

          // Animate
          requestAnimationFrame(() => {
            particle.style.transition =
              "all 0.6s cubic-bezier(0.25, 1, 0.5, 1)";
            particle.style.transform = `translate(${tx}px, ${ty}px) scale(0)`;
            particle.style.opacity = "1";

            setTimeout(() => {
              particle.style.opacity = "0";
              setTimeout(() => particle.remove(), 200);
            }, 400);
          });
        }
      });
    </script>
